<!doctype html>
<!--
  M2 "Dispatcher" — the browser side. PROVIDED, and almost identical to week 1
  (that's deliberate: this week is a server-side week). Two additions:

    * each turn shows CHIPS for the tools the model called (X-Tools header) —
      when your agent files a ticket, you SEE the tool fire
    * a "new call" button that clears the server's conversation memory

  Watch the latency bar when a tool fires: the Grok segment roughly doubles,
  because a tool call costs a second model round trip (Lecture 2, Slide 20).
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>M2 — Dispatcher</title>
<style>
  :root {
    --bg: #0f1117; --panel: #181b24; --text: #e8eaf0; --dim: #8b90a0;
    --accent: #e4573d; --stt: #4e9af1; --llm: #b17ce8; --tts: #4ecf8a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; background: var(--bg); color: var(--text);
    font: 16px/1.5 system-ui, sans-serif; padding: 2rem 1rem;
  }
  h1 { font-size: 1.2rem; font-weight: 600; margin: 0 0 .25rem; }
  #status { color: var(--dim); min-height: 1.5em; margin-bottom: 1.5rem; }

  #ptt {
    width: 9rem; height: 9rem; border-radius: 50%; border: none;
    background: var(--accent); color: #fff; font: 600 1rem system-ui;
    cursor: pointer; touch-action: none; user-select: none; -webkit-user-select: none;
    transition: transform .1s, box-shadow .1s;
  }
  #ptt.recording { transform: scale(1.12); box-shadow: 0 0 0 12px rgba(228,87,61,.25); }
  #ptt:disabled { background: #3a3f4e; cursor: not-allowed; }

  #reset {
    margin-top: 1rem; background: none; border: 1px solid #3a3f4e; color: var(--dim);
    border-radius: 8px; padding: .35rem .9rem; font: 500 .85rem system-ui; cursor: pointer;
  }
  #reset:hover { color: var(--text); border-color: var(--dim); }

  #log { width: 100%; max-width: 40rem; margin-top: 2rem; }
  .turn { background: var(--panel); border-radius: 10px; padding: .8rem 1rem; margin-bottom: .8rem; }
  .turn .who { font-size: .75rem; text-transform: uppercase; letter-spacing: .05em; color: var(--dim); }
  .turn .err { color: #ff7a6b; white-space: pre-wrap; }

  /* tool chips: proof the model reached for a tool this turn */
  .tools { margin-top: .6rem; }
  .tools span {
    display: inline-block; font: 500 .75rem ui-monospace, monospace;
    background: rgba(78,207,138,.12); color: var(--tts);
    border: 1px solid rgba(78,207,138,.4); border-radius: 999px;
    padding: .15rem .6rem; margin-right: .4rem;
  }

  .lat { display: flex; height: 10px; border-radius: 5px; overflow: hidden; margin-top: .6rem; }
  .lat span { display: block; }
  .lat .stt { background: var(--stt); } .lat .llm { background: var(--llm); }
  .lat .tts { background: var(--tts); } .lat .other { background: #555b6e; }
  .latlabel { font-size: .75rem; color: var(--dim); margin-top: .3rem; }
  .key { color: var(--dim); font-size: .75rem; margin-top: 1rem; }
  .key i { display: inline-block; width: .7em; height: .7em; border-radius: 2px; margin: 0 .3em 0 1em; }
</style>
</head>
<body>
  <h1>M2 — Dispatcher</h1>
  <div id="status">Loading…</div>

  <button id="ptt" disabled>HOLD<br>TO TALK</button>
  <button id="reset" title="Clear the server's conversation memory">✕ new call</button>
  <div class="key">
    latency: <i style="background:var(--stt)"></i>STT
    <i style="background:var(--llm)"></i>Grok (incl. tools)
    <i style="background:var(--tts)"></i>TTS
    <i style="background:#555b6e"></i>network/other
  </div>

  <div id="log"></div>

<script>
const $ = (id) => document.getElementById(id);
const status = (msg) => { $("status").textContent = msg; };

let recorder = null;
let chunks = [];

// Mic + MediaRecorder — unchanged from week 1 (localhost/HTTPS only).
async function init() {
  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch (e) {
    status("Mic permission denied (or not on localhost/HTTPS): " + e.message);
    return;
  }
  const mimeType = ["audio/webm;codecs=opus", "audio/webm", "audio/mp4"]
    .find((t) => MediaRecorder.isTypeSupported(t)) || "";
  recorder = new MediaRecorder(stream, mimeType ? { mimeType } : {});
  recorder.ondataavailable = (e) => chunks.push(e.data);
  recorder.onstop = sendClip;

  $("ptt").disabled = false;
  status("Hold the button and report a problem — try a broken heater.");
}

function startRec() {
  if (!recorder || recorder.state === "recording") return;
  chunks = [];
  recorder.start();
  $("ptt").classList.add("recording");
  status("Recording… release to send.");
}
function stopRec() {
  if (!recorder || recorder.state !== "recording") return;
  recorder.stop();
  $("ptt").classList.remove("recording");
}
$("ptt").addEventListener("pointerdown", (e) => { e.preventDefault(); startRec(); });
$("ptt").addEventListener("pointerup", stopRec);
$("ptt").addEventListener("pointerleave", stopRec);
document.addEventListener("keydown", (e) => { if (e.code === "Space" && !e.repeat) startRec(); });
document.addEventListener("keyup", (e) => { if (e.code === "Space") stopRec(); });

// NEW this week: wipe the server-side conversation memory (Slide 19).
$("reset").addEventListener("click", async () => {
  await fetch("/reset", { method: "POST" });
  $("log").innerHTML = "";
  status("New call — memory cleared.");
});

async function sendClip() {
  const clip = new Blob(chunks, { type: recorder.mimeType || "audio/webm" });
  if (clip.size < 1000) { status("Clip too short — hold the button while speaking."); return; }

  status("Thinking…");
  $("ptt").disabled = true;
  const t0 = performance.now();

  try {
    const res = await fetch("/answer", { method: "POST", body: clip });
    const roundTrip = Math.round(performance.now() - t0);

    if (!res.ok) {
      addTurn({ error: await res.text() });
      return;
    }

    const timings = JSON.parse(res.headers.get("X-Timings") || "{}");
    const tools = JSON.parse(res.headers.get("X-Tools") || "[]");
    const transcript = maybeJson(res.headers.get("X-Transcript"));
    const reply = maybeJson(res.headers.get("X-Reply"));

    const audio = new Audio(URL.createObjectURL(await res.blob()));
    await audio.play();

    addTurn({ transcript, reply, tools, timings, roundTrip });
  } catch (e) {
    addTurn({ error: String(e) });
  } finally {
    $("ptt").disabled = false;
    status("Hold the button to keep talking.");
  }
}

const maybeJson = (h) => (h ? JSON.parse(h) : null);

function addTurn({ transcript, reply, tools = [], timings = {}, roundTrip, error }) {
  const div = document.createElement("div");
  div.className = "turn";

  if (error) {
    div.innerHTML = `<div class="who">Server error</div><div class="err"></div>`;
    div.querySelector(".err").textContent = error;
  } else {
    div.innerHTML = `
      <div class="who">You</div><div></div>
      <div class="who" style="margin-top:.5rem">Agent</div><div></div>
      <div class="tools"></div>
      <div class="lat"></div><div class="latlabel"></div>`;
    const texts = div.querySelectorAll("div:not([class])");
    texts[0].textContent = transcript ?? "(no transcript)";
    texts[1].textContent = reply ?? "";

    // Tool chips: one per call the model made this turn.
    const toolsEl = div.querySelector(".tools");
    for (const t of tools) {
      const chip = document.createElement("span");
      chip.textContent = "🔧 " + t;
      toolsEl.appendChild(chip);
    }
    if (!tools.length) toolsEl.remove();

    const { stt = 0, llm = 0, tts = 0 } = timings;
    const other = Math.max(roundTrip - stt - llm - tts, 0);
    const bar = div.querySelector(".lat");
    for (const [cls, ms] of [["stt", stt], ["llm", llm], ["tts", tts], ["other", other]]) {
      const seg = document.createElement("span");
      seg.className = cls;
      seg.style.width = (100 * ms / Math.max(roundTrip, 1)) + "%";
      bar.appendChild(seg);
    }
    div.querySelector(".latlabel").textContent =
      `STT ${stt} ms · Grok ${llm} ms · TTS ${tts} ms · round trip ${roundTrip} ms`;
  }
  $("log").prepend(div);
}

init();
</script>
</body>
</html>
